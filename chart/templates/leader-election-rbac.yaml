{{- if .Values.leaderElection.enabled }}
# Namespaced leader-election permissions (config/rbac/leader_election_role.yaml).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nomad-operator-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nomad-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nomad-operator-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nomad-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nomad-operator-leader-election
subjects:
  - kind: ServiceAccount
    name: nomad-operator
    namespace: {{ .Release.Namespace }}
{{- end }}
