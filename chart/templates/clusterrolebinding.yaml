apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nomad-operator
  labels:
    {{- include "nomad-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nomad-operator
subjects:
  - kind: ServiceAccount
    name: nomad-operator
    namespace: {{ .Release.Namespace }}
