---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - nomad.operator.io
  resources:
  - nomadclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - nomad.operator.io
  resources:
  - nomadclusters/finalizers
  verbs:
  - update
- apiGroups:
  - nomad.operator.io
  resources:
  - nomadclusters/status
  verbs:
  - get
  - patch
  - update
