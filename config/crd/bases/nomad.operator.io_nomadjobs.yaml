---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: nomadjobs.nomad.operator.io
spec:
  group: nomad.operator.io
  names:
    kind: NomadJob
    listKind: NomadJobList
    plural: nomadjobs
    singular: nomadjob
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterRef.name
      name: Cluster
      type: string
    - jsonPath: .spec.jobID
      name: Job
      type: string
    - jsonPath: .status.jobStatus
      name: Status
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: NomadJob is the Schema for the nomadjobs API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              NomadJobSpec is the desired state of a Nomad job. clusterRef + jobID are the
              immutable identity; job is the full Nomad jobspec. The CR is the source of
              truth: the operator strict-decodes spec.job into api.Job, injects the
              authoritative ID/Region, and Registers it (drift-gated by Plan).
            properties:
              clusterRef:
                description: ClusterRef names the NomadCluster (same namespace) this
                  job runs on.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              job:
                description: |-
                  Job is the Nomad jobspec expressed as the api.Job structure (camelCase or
                  PascalCase; keys match api.Job case-insensitively). It is schemaless: the
                  CRD does not model its fields, so there is no per-field validation — the
                  operator strict-decodes it (unknown/typo'd keys are rejected). NOTE:
                  time.Duration fields (e.g. update.minHealthyTime) must be integer
                  nanoseconds, not "10s" strings.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              jobID:
                description: |-
                  JobID is the exact Nomad job ID. It is a separate top-level field (not read
                  from spec.job) because CEL cannot validate into a schemaless RawExtension,
                  so identity and immutability must live here. The operator injects it as the
                  authoritative job.ID; a differing job.id inside spec.job is rejected.
                pattern: ^[a-zA-Z0-9-_.]{1,128}$
                type: string
            required:
            - clusterRef
            - job
            - jobID
            type: object
            x-kubernetes-validations:
            - message: jobID is immutable
              rule: self.jobID == oldSelf.jobID
            - message: clusterRef.name is immutable
              rule: self.clusterRef.name == oldSelf.clusterRef.name
          status:
            description: NomadJobStatus is the observed state, operator-owned.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              groups:
                additionalProperties:
                  description: |-
                    NomadJobGroupStatus is the observed vs desired allocation count for one task
                    group.
                  properties:
                    desired:
                      type: integer
                    running:
                      type: integer
                  type: object
                description: Groups maps each task-group name to its running/desired
                  allocation counts.
                type: object
              jobStatus:
                description: JobStatus is Nomad's job status (running/pending/dead)
                  from Info.
                type: string
              jobVersion:
                description: |-
                  JobVersion is the server-observed job version from Info (distinct from
                  observedGeneration, which tracks the CR).
                format: int64
                type: integer
              observedGeneration:
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
