                type: object
              tls:
                description: TLSSpec configures the TLS material used for Nomad's
                  RPC/HTTP listeners.
                properties:
                  certSecretRef:
                    description: |-
                      CertSecretRef names a cert-manager-issued Secret (tls.crt, tls.key, ca.crt).
