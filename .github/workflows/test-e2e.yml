name: E2E Tests

on:
  push:
  pull_request:

permissions: {}

jobs:
  test-e2e:
    permissions:
      contents: read
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Running Test e2e
        run: |
          go mod tidy
          # The manager watches Gateway API types (Gateway/TCPRoute/TLSRoute);
          # without their CRDs it crashloops on cache-sync and the
          # "should run successfully" check fails. Create the cluster, install
          # the vendored Gateway API CRDs, then run the suite (its own
          # setup-test-e2e is a no-op once the cluster exists).
          make setup-test-e2e
          kubectl apply -f config/crd/gateway-api/
          make test-e2e
